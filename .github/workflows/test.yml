name: Validar Dados e Testes

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "src/**"
      - "exports/csv/**"
      - "tests/**"
      - "requirements-dev.txt"
  pull_request:
    branches: [main]

jobs:
  test:
    name: Executar Testes de Validação
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Executar testes
        run: |
          pytest tests/test_data_validation.py -v --tb=short --html=tests/report.html --self-contained-html

      - name: Upload resultado dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: tests/report.html

      - name: Falhar se testes não passarem
        if: failure()
        run: exit 1
